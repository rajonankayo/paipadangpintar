    // ===== STATE =====
    let currentView = 'home';
    let selectedKelas = null;
    let selectedMateri = null;
    let quizState = { current: 0, score: 0, answers: [], mode: null, questions: [] };

    // ===== CONFIG =====
    const appTitle = 'PAI Padang Pintar';
    const appTagline = 'Media Pembelajaran Interaktif';

    // ===== RENDER HELPERS =====
    function md(text) {
      return text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-amber-300">$1</strong>').replace(/\n/g, '<br>');
    }

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast ${type === 'success' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    // ===== VIEWS =====
    function goHome() { currentView = 'home'; selectedKelas = null; selectedMateri = null; render(); }
    function selectKelas(k) { currentView = 'kelas'; selectedKelas = k; render(); }
    function selectMateri(ki, mi) { currentView = 'materi'; selectedKelas = ki; selectedMateri = mi; render(); }
    function startQuiz(ki, mi) {
      const m = KELAS_DATA[ki].materi[mi];
      quizState = { current: 0, score: 0, answers: [], mode: 'materi', questions: shuffleArr([...m.soal]) };
      currentView = 'quiz'; render();
    }
    function startBankSoal(ki) {
      const allQ = [];
      KELAS_DATA[ki].materi.forEach(m => m.soal.forEach(s => allQ.push(s)));
      quizState = { current: 0, score: 0, answers: [], mode: 'bank', questions: shuffleArr(allQ).slice(0, Math.min(15, allQ.length)) };
      currentView = 'quiz'; render();
    }
    function shuffleArr(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]] } return a; }

    function render() {
      const mc = document.getElementById('main-content');
      const bc = document.getElementById('breadcrumb');
      mc.innerHTML = '';
      bc.classList.add('hidden');

      if (currentView === 'home') renderHome(mc);
      else if (currentView === 'kelas') renderKelas(mc, bc);
      else if (currentView === 'materi') renderMateri(mc, bc);
      else if (currentView === 'quiz') renderQuiz(mc, bc);
      else if (currentView === 'result') renderResult(mc, bc);

      lucide.createIcons();
      mc.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderHome(mc) {
      mc.innerHTML = `
    <div class="fade-in text-center mb-8">
      <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-4xl shadow-2xl pulse-glow font-amiri text-emerald-900 font-bold">ﷲ</div>
      <h1 class="text-3xl sm:text-4xl font-extrabold text-white mb-2">${appTitle}</h1>
      <p class="text-emerald-300 font-medium">${appTagline}</p>
      <p class="text-emerald-400 text-sm mt-1">SD Kelas 1 — 6</p>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 fade-in">
      ${KELAS_DATA.map((k, i) => `
        <button onclick="selectKelas(${i})" class="card-hover rounded-2xl bg-gradient-to-br ${k.warna} p-5 text-white text-left shadow-lg">
          <div class="text-3xl mb-2">${k.emoji}</div>
          <div class="font-bold text-lg">Kelas ${k.kelas}</div>
          <div class="text-white/80 text-xs mt-1">${k.materi.length} materi</div>
        </button>
      `).join('')}
    </div>
    <div class="mt-6 p-4 rounded-2xl bg-emerald-800/50 border border-emerald-700/50 fade-in">
      <div class="flex items-center gap-2 mb-2">
        <i data-lucide="sparkles" class="w-4 h-4 text-amber-400"></i>
        <span class="text-amber-300 font-semibold text-sm">Fitur Aplikasi</span>
      </div>
      <div class="grid grid-cols-3 gap-3 text-center text-xs text-emerald-300">
        <div><i data-lucide="book" class="w-5 h-5 mx-auto mb-1 text-emerald-400"></i>Materi Lengkap</div>
        <div><i data-lucide="brain" class="w-5 h-5 mx-auto mb-1 text-emerald-400"></i>Kuis Interaktif</div>
        <div><i data-lucide="layers" class="w-5 h-5 mx-auto mb-1 text-emerald-400"></i>Bank Soal</div>
      </div>
    </div>
    <div class="mt-8 pt-6 border-t border-emerald-700/50 text-center">
      <p class="text-emerald-400 text-xs">
        <i data-lucide="zap" class="w-3 h-3 inline mr-1"></i>
        Dikembangkan oleh <span class="text-amber-300 font-semibold">Tim IT KKG PAI Kota Padang</span>
      </p>
      <p class="text-emerald-500/60 text-[10px] mt-1">© 2024 — Media Pembelajaran Islam Berkualitas</p>
    </div>
  `;
    }

    function renderKelas(mc, bc) {
      const k = KELAS_DATA[selectedKelas];
      bc.classList.remove('hidden');
      bc.innerHTML = `<span class="text-emerald-500">Kelas ${k.kelas}</span>`;
      mc.innerHTML = `
    <div class="fade-in">
      <button onclick="goHome()" class="flex items-center gap-1 text-emerald-400 hover:text-emerald-300 text-sm font-medium mb-4 transition">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
      </button>
      <div class="flex items-center gap-3 mb-6">
        <div class="text-4xl">${k.emoji}</div>
        <div>
          <h2 class="text-2xl font-bold text-white">Kelas ${k.kelas}</h2>
          <p class="text-emerald-400 text-sm">${k.materi.length} materi pembelajaran</p>
        </div>
      </div>

      <div class="space-y-3 mb-6">
        ${k.materi.map((m, i) => `
          <button onclick="selectMateri(${selectedKelas},${i})" class="card-hover w-full text-left rounded-xl bg-emerald-800/60 border border-emerald-700/40 p-4 flex items-center gap-3 transition hover:bg-emerald-800/80">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br ${k.warna} flex items-center justify-center text-white font-bold text-sm shrink-0">${i + 1}</div>
            <div class="flex-1 min-w-0">
              <div class="text-white font-semibold text-sm truncate">${m.judul}</div>
              <div class="text-emerald-400 text-xs">${m.soal.length} soal latihan</div>
            </div>
            <i data-lucide="chevron-right" class="w-4 h-4 text-emerald-500 shrink-0"></i>

      </div>

      <button onclick="startBankSoal(${selectedKelas})" class="w-full rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 text-emerald-900 font-bold p-4 flex items-center justify-center gap-2 card-hover shadow-lg">
        <i data-lucide="database" class="w-5 h-5"></i>
        Bank Soal Kelas ${k.kelas} (${k.materi.reduce((a, m) => a + m.soal.length, 0)} Soal)
      </button>
    </div>
  `;
    }

    function renderMateri(mc, bc) {
      const k = KELAS_DATA[selectedKelas];
      const m = k.materi[selectedMateri];
      bc.classList.remove('hidden');
      bc.innerHTML = `<span class="text-emerald-500">Kelas ${k.kelas}</span> <span class="text-emerald-700 mx-1">›</span> <span class="text-emerald-400">${m.judul}</span>`;
      mc.innerHTML = `
    <div class="fade-in">
      <button onclick="selectKelas(${selectedKelas})" class="flex items-center gap-1 text-emerald-400 hover:text-emerald-300 text-sm font-medium mb-4 transition">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Kelas ${k.kelas}
      </button>
      <div class="rounded-2xl bg-emerald-800/60 border border-emerald-700/40 overflow-hidden">
        <div class="bg-gradient-to-r ${k.warna} p-5">
          <div class="text-white/80 text-xs font-medium">Kelas ${k.kelas}</div>
          <h2 class="text-xl font-bold text-white">${m.judul}</h2>
        </div>
        <div class="p-5 text-emerald-100 text-sm leading-relaxed font-amiri" style="font-size:1.05em">
          ${md(m.isi)}
        </div>
      </div>
      <button onclick="startQuiz(${selectedKelas},${selectedMateri})" class="w-full mt-4 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold p-4 flex items-center justify-center gap-2 card-hover shadow-lg">
        <i data-lucide="help-circle" class="w-5 h-5"></i>
        Mulai Kuis (${m.soal.length} Soal)
      </button>
    </div>
  `;
    }

    function renderQuiz(mc, bc) {
      const qs = quizState.questions;
      const ci = quizState.current;
      const q = qs[ci];
      bc.classList.remove('hidden');
      bc.textContent = `Soal ${ci + 1}/${qs.length}`;

      mc.innerHTML = `
    <div class="fade-in">
      <div class="flex items-center justify-between mb-4">
        <span class="text-emerald-400 text-sm font-medium">Soal ${ci + 1} dari ${qs.length}</span>
        <span class="text-amber-400 text-sm font-bold">Skor: ${quizState.score}</span>
      </div>
      <div class="w-full bg-emerald-900 rounded-full h-2 mb-6">
        <div class="bg-gradient-to-r from-amber-400 to-emerald-400 h-2 rounded-full transition-all duration-500" style="width:${((ci + 1) / qs.length) * 100}%"></div>
      </div>
      <div class="rounded-2xl bg-emerald-800/60 border border-emerald-700/40 p-5 mb-4">
        <p class="text-white font-semibold text-base">${q.q}</p>
      </div>
      <div class="space-y-3" id="quiz-options">
        ${q.o.map((o, i) => `
          <button onclick="answerQuiz(${i})" class="quiz-option w-full text-left rounded-xl border-2 border-emerald-700/40 bg-emerald-800/40 hover:bg-emerald-700/50 hover:border-emerald-500 p-4 text-emerald-100 font-medium text-sm flex items-center gap-3 transition" id="opt-${i}">
            <span class="w-8 h-8 rounded-lg bg-emerald-700/60 flex items-center justify-center text-emerald-300 font-bold text-xs shrink-0">${String.fromCharCode(65 + i)}</span>
            ${o}
          </button>
        `).join('')}
      </div>
    </div>
  `;
    }

    function answerQuiz(idx) {
      const q = quizState.questions[quizState.current];
      const correct = idx === q.a;
      if (correct) quizState.score++;
      quizState.answers.push({ q: q.q, selected: idx, correct: q.a, isCorrect: correct });

      // highlight
      document.querySelectorAll('#quiz-options button').forEach((b, i) => {
        b.disabled = true;
        b.style.pointerEvents = 'none';
        if (i === q.a) b.className = 'quiz-option w-full text-left rounded-xl border-2 border-emerald-400 bg-emerald-600/50 p-4 text-white font-medium text-sm flex items-center gap-3';
        else if (i === idx && !correct) b.className = 'quiz-option w-full text-left rounded-xl border-2 border-red-400 bg-red-900/30 p-4 text-red-300 font-medium text-sm flex items-center gap-3';
      });

      showToast(correct ? '✅ Benar!' : '❌ Salah!', correct ? 'success' : 'error');

      setTimeout(() => {
        quizState.current++;
        if (quizState.current >= quizState.questions.length) { currentView = 'result'; render(); }
        else render();
      }, 1200);
    }

    function renderResult(mc, bc) {
      const total = quizState.questions.length;
      const score = quizState.score;
      const pct = Math.round((score / total) * 100);
      let grade, emoji, msg;
      if (pct >= 90) { grade = 'A'; emoji = '🏆'; msg = 'Masya Allah, Luar Biasa!'; }
      else if (pct >= 70) { grade = 'B'; emoji = '⭐'; msg = 'Alhamdulillah, Bagus!'; }
      else if (pct >= 50) { grade = 'C'; emoji = '💪'; msg = 'Lumayan, Terus Belajar!'; }
      else { grade = 'D'; emoji = '📖'; msg = 'Ayo Belajar Lagi!'; }

      bc.classList.remove('hidden');
      bc.textContent = 'Hasil Kuis';

      mc.innerHTML = `
    <div class="fade-in text-center">
      <div class="text-6xl mb-3">${emoji}</div>
      <h2 class="text-2xl font-extrabold text-white mb-1">${msg}</h2>
      <p class="text-emerald-300 text-sm mb-6">Nilai: <span class="text-amber-400 font-bold text-lg">${grade}</span></p>

      <div class="rounded-2xl bg-emerald-800/60 border border-emerald-700/40 p-6 mb-6 inline-block">
        <div class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-emerald-400">${score}/${total}</div>
        <div class="text-emerald-400 text-sm mt-1">${pct}% Benar</div>
      </div>

      <div class="space-y-2 text-left mb-6 max-h-64 overflow-y-auto">
        ${quizState.answers.map((a, i) => `
          <div class="rounded-lg p-3 text-xs ${a.isCorrect ? 'bg-emerald-700/40 border border-emerald-600/40' : 'bg-red-900/30 border border-red-700/40'}">
            <div class="flex items-start gap-2">
              <span>${a.isCorrect ? '✅' : '❌'}</span>
              <div>
                <div class="text-white font-medium">${i + 1}. ${a.q}</div>
                ${!a.isCorrect ? `<div class="text-red-300 mt-1">Jawabanmu: ${quizState.questions[i].o[a.selected]}</div><div class="text-emerald-300">Jawaban benar: ${quizState.questions[i].o[a.correct]}</div>` : ''}
              </div>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="flex gap-3">
        <button onclick="goHome()" class="flex-1 rounded-xl bg-emerald-700 hover:bg-emerald-600 text-white font-bold py-3 transition">
          <i data-lucide="home" class="w-4 h-4 inline mr-1"></i> Beranda
        </button>
        <button onclick="${quizState.mode === 'bank' ? `startBankSoal(${selectedKelas})` : `startQuiz(${selectedKelas},${selectedMateri})`}" class="flex-1 rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 text-emerald-900 font-bold py-3 transition card-hover">
          <i data-lucide="refresh-cw" class="w-4 h-4 inline mr-1"></i> Ulangi
        </button>
      </div>
    </div>
  `;
    }

    // Initial render
    render();
  </script>
